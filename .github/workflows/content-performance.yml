name: Content Performance Agent — Weekly Traffic Analysis

on:
  schedule:
    - cron: '0 9 * * 0'
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze and recommend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      - name: Generate performance report
        run: node scripts/content-performance-agent.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit report
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          BRANCH="auto/performance-$(date +%s)"
          git config user.email "bot@aipulsedaily.com"
          git config user.name "Content Performance Agent"
          git checkout -b "$BRANCH"
          git add public/reports/
          git commit -m "auto: content performance report $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create --title "auto: content performance report $(date +%Y-%m-%d)" --body "Weekly content performance analysis with recommendations." --base main --head "$BRANCH" --label auto-generated | tee pr-url.txt
          gh pr merge --auto --squash "$(grep -oP '/pull/\K[0-9]+' pr-url.txt)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
