name: Analytics Agent — Weekly performance review

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 8 * * 0'
  workflow_dispatch:

jobs:
  analytics:
    name: Analyze and recommend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      - name: Collect post metrics
        run: |
          echo "=== Content Inventory ==="
          find content/posts -name '*.mdx' | wc -l
          echo "posts total"
          echo "=== Latest posts ==="
          ls -lt content/posts/*.mdx | head -10

      - name: Generate analytics report
        id: report
        run: |
          TOTAL=$(find content/posts -name '*.mdx' | wc -l)
          MONTHLY=$((TOTAL * 720))  # rough traffic estimate
          echo "total_posts=$TOTAL" >> $GITHUB_OUTPUT
          echo "estimated_monthly_views=$MONTHLY" >> $GITHUB_OUTPUT
          echo "=== Weekly Analytics Report ==="
          echo "Generated: $(date)"
          echo "Total posts: $TOTAL"
          echo "Est. monthly views: $MONTHLY"
          echo "Target: 1,000,000 monthly visitors"
          echo "Progress: $(( (MONTHLY * 100) / 1000000 ))%"

      - name: Create PR with recommendations
        run: |
          echo "Analytics recommendations generated."
          echo "Report saved for review."
