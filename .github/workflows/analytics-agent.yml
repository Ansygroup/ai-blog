name: Analytics Agent — Weekly performance review

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 8 * * 0'
  workflow_dispatch:

jobs:
  analytics:
    name: Analyze and recommend
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      - name: Generate analytics report
        run: node scripts/analytics-report.js

      - name: Commit report
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          BRANCH="auto/analytics-$(date +%s)"
          git config user.email "bot@aipulsedaily.com"
          git config user.name "Analytics Agent"
          git checkout -b "$BRANCH"
          git add public/reports/
          git commit -m "auto: weekly analytics $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create --title "auto: analytics report $(date +%Y-%m-%d)" --body "Weekly content analytics report." --base main --head "$BRANCH" --label auto-generated | tee pr-url.txt
          gh pr merge --auto --squash "$(grep -oP '/pull/\K[0-9]+' pr-url.txt)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
