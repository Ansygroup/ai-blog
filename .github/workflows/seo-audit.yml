name: SEO Audit

on:
  pull_request:
    paths: ['content/posts/**', 'scripts/seo-audit.js']
  workflow_dispatch:

jobs:
  audit:
    name: Run SEO audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: SEO audit
        run: node scripts/seo-audit.js
