name: Agent Supervisor — Content Generation

on:
  push:
    branches: [main]
    paths: [.github/workflows/agent-supervisor.yml]
  schedule:
    - cron: '30 */4 * * *'
  workflow_dispatch:
    inputs:
      batch:
        description: 'Number of articles to generate'
        required: true
        default: '5'
      tier:
        description: 'Queue tier (1-5)'
        required: false
        default: ''

jobs:
  generate:
    name: Generate articles via agent pool
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      - name: Run supervisor agent
        run: |
          BATCH="${{ github.event.inputs.batch || '5' }}"
          TIER="${{ github.event.inputs.tier }}"
          CMD="npx tsx scripts/agents/supervisor-agent.ts --batch $BATCH"
          if [ -n "$TIER" ]; then CMD="$CMD --tier $TIER"; fi
          echo "Running: $CMD"
          eval "$CMD"
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GROQ_API_KEY_5: ${{ secrets.GROQ_API_KEY_5 }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          REVALIDATION_SECRET: ${{ secrets.REVALIDATION_SECRET }}

      - name: SEO audit new articles
        run: node scripts/seo-audit.js

      - name: Build verification
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SITE_NAME: ${{ secrets.NEXT_PUBLIC_SITE_NAME }}

      - name: Open PR with new content
        run: |
          if git diff --quiet; then
            echo "No changes to push."
            exit 0
          fi
          BRANCH="auto/agent-$(date +%s)"
          git config user.email "bot@ai-blog-ten-steel.vercel.app"
          git config user.name "Agent Publisher"
          git checkout -b "$BRANCH"
          git add content/posts/ scripts/agents/
          git commit -m "auto: agent-generated articles

          Generated by Supervisor Agent pipeline.
          $(git diff --name-only --diff-filter=A -- 'content/posts/*.mdx' | head -5 | sed 's/^/- /')"
          git push origin "$BRANCH"
          gh pr create \
            --title "auto: agent-generated articles $(date +%Y-%m-%d)" \
            --body "Auto-generated by the Supervisor Agent. Quality-gated (SEO ≥ 75)." \
            --base main \
            --head "$BRANCH" \
            --label "auto-generated" | tee pr-url.txt
          PR_NUMBER=$(grep -oP '/pull/\K[0-9]+' pr-url.txt)
          gh pr merge --auto --squash "$PR_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: IndexNow submit
        if: always()
        run: node scripts/indexnow-submit.js || echo "IndexNow submit failed (non-fatal)"
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
