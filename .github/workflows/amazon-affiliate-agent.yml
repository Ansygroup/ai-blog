name: Amazon Affiliate Agent — Link insertion

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths: ['content/posts/**']
  workflow_dispatch:

jobs:
  affiliate:
    name: Insert Amazon affiliate links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      - name: Get changed files
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 -- content/posts/ 2>/dev/null || git diff --name-only -- content/posts/ 2>/dev/null || echo "")
          if [ -z "$CHANGED" ]; then
            echo "No changed posts."
            echo "has_changes=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "has_changes=true" >> $GITHUB_OUTPUT
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Add affiliate links to changed posts
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          node scripts/affiliate-linker.js ${{ steps.changes.outputs.files }}
        env:
          AMAZON_ASSOCIATES_TAG: ${{ secrets.AMAZON_ASSOCIATES_TAG }}
          AMAZON_STORE_ID: ${{ secrets.AMAZON_STORE_ID }}

      - name: Create PR
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          if git diff --quiet; then
            echo "No affiliate links added."
            exit 0
          fi
          BRANCH="auto/affiliate-$(date +%s)"
          git config user.email "bot@aipulsedaily.com"
          git config user.name "Affiliate Agent"
          git checkout -b "$BRANCH"
          git add content/posts/
          git commit -m "auto: add affiliate links $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create --title "auto: affiliate links $(date +%Y-%m-%d)" --body "Inserted Amazon affiliate links." --base main --head "$BRANCH" --label auto-generated | tee pr-url.txt
          gh pr merge --auto --squash "$(grep -oP '/pull/\K[0-9]+' pr-url.txt)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
