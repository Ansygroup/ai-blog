name: Amazon Affiliate Agent — Link insertion

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths: ['content/posts/**']
  workflow_dispatch:

jobs:
  affiliate:
    name: Insert Amazon affiliate links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      - name: Get new posts
        id: posts
        run: |
          NEW_FILES=$(git diff --name-only HEAD~1 -- content/posts/ || echo "")
          if [ -z "$NEW_FILES" ]; then
            echo "No new posts."
            echo "has_posts=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "has_posts=true" >> $GITHUB_OUTPUT
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Add affiliate links
        if: steps.posts.outputs.has_posts == 'true'
        run: |
          TAG="${{ secrets.AMAZON_ASSOCIATES_TAG }}"
          if [ -z "$TAG" ]; then
            echo "No Amazon Associates tag configured — skipping."
            exit 0
          fi
          for f in ${{ steps.posts.outputs.files }}; do
            if [ ! -f "$f" ]; then continue; fi
            echo "Checking $f for affiliate opportunities..."
            grep -ni "amazon.com\|amazon.*price\|buy now\|check price\|best price" "$f" || echo "  No direct Amazon mentions found."
            echo "  Tag: $TAG"
          done
