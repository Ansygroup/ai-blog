name: Social Agent — Share new content

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths: ['content/posts/**']
  workflow_dispatch:

jobs:
  social:
    name: Generate social posts
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      - name: Get new posts
        id: posts
        run: |
          NEW_FILES=$(git diff --name-only HEAD~1 -- content/posts/ || echo "")
          if [ -z "$NEW_FILES" ]; then
            echo "No new posts."
            echo "has_posts=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "has_posts=true" >> $GITHUB_OUTPUT
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$NEW_FILES" | tail -n 5 >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Generate social content
        if: steps.posts.outputs.has_posts == 'true'
        run: |
          for f in ${{ steps.posts.outputs.files }}; do
            if [ -f "$f" ]; then node scripts/social-content.js "$f"; fi
          done
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Commit social content
        if: steps.posts.outputs.has_posts == 'true'
        run: |
          BRANCH="auto/social-$(date +%s)"
          git config user.email "bot@aipulsedaily.com"
          git config user.name "Social Agent"
          git checkout -b "$BRANCH"
          git add public/social/
          git commit -m "auto: social content for new posts" || exit 0
          git push origin "$BRANCH"
          gh pr create --title "auto: social content $(date +%Y-%m-%d)" --body "Generated social media posts." --base main --head "$BRANCH" --label auto-generated | tee pr-url.txt
          gh pr merge --auto --squash "$(grep -oP '/pull/\K[0-9]+' pr-url.txt)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
