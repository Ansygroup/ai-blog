name: Programmatic SEO Agent — Comparison pages


on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  programmatic:
    name: Generate comparison pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      - name: Generate comparison pages
        run: node scripts/programmatic-generator.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Build verification
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SITE_NAME: ${{ secrets.NEXT_PUBLIC_SITE_NAME }}

      - name: Create PR
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          BRANCH="auto/comparisons-$(date +%s)"
          git config user.email "bot@aipulsedaily.com"
          git config user.name "Programmatic SEO Agent"
          git checkout -b "$BRANCH"
          git add content/posts/
          git commit -m "auto: new comparison pages $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create --title "auto: programmatic SEO pages $(date +%Y-%m-%d)" --body "Auto-generated comparison pages." --base main --head "$BRANCH" --label auto-generated | tee pr-url.txt
          gh pr merge --auto --squash "$(grep -oP '/pull/\K[0-9]+' pr-url.txt)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
