name: GEO Agent — AI search optimization

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 7 * * 6'
  workflow_dispatch:

jobs:
  geo:
    name: Optimize for AI engines
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      - name: Check GEO sections in posts
        run: |
          echo "Checking posts for AI-optimized snippets..."
          TOTAL=$(ls content/posts/*.mdx 2>/dev/null | wc -l)
          WITH_QA=$(grep -l "Quick Answer" content/posts/*.mdx 2>/dev/null | wc -l)
          WITH_TAKEAWAYS=$(grep -l 'class="key-takeaways"' content/posts/*.mdx 2>/dev/null | wc -l)
          echo "Total posts: $TOTAL"
          echo "Posts with Quick Answer: $WITH_QA"
          echo "Posts with Key Takeaways: $WITH_TAKEAWAYS"
          echo "Coverage: $(( WITH_QA * 100 / TOTAL ))%"
          echo "Report saved to public/reports/geo-check.txt"
          mkdir -p public/reports
          echo "GEO Check $(date +%Y-%m-%d)" > public/reports/geo-check.txt
          echo "Total posts: $TOTAL" >> public/reports/geo-check.txt
          echo "Quick Answer: $WITH_QA" >> public/reports/geo-check.txt
          echo "Key Takeaways: $WITH_TAKEAWAYS" >> public/reports/geo-check.txt

      - name: Create PR with report
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          BRANCH="auto/geo-$(date +%s)"
          git config user.email "bot@aipulsedaily.com"
          git config user.name "GEO Agent"
          git checkout -b "$BRANCH"
          git add public/reports/geo-check.txt
          git commit -m "auto: GEO check $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create --title "auto: GEO check $(date +%Y-%m-%d)" --body "Weekly GEO coverage report." --base main --head "$BRANCH" --label auto-generated | tee pr-url.txt
          PR_NUMBER=$(grep -oP '/pull/\K[0-9]+' pr-url.txt)
          gh pr merge --auto --squash "$PR_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
