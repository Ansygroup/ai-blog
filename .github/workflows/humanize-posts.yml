name: Humanize Posts — Remove AI Writing Patterns

on:
  workflow_dispatch:
    inputs:
      slug:
        description: 'Post slug to humanize (leave empty for all)'
        required: false
        default: ''

jobs:
  humanize:
    name: Humanize post(s)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      - name: Run humanizer
        run: |
          if [ -z "${{ inputs.slug }}" ]; then
            node scripts/humanize-post.js
          else
            node scripts/humanize-post.js "${{ inputs.slug }}"
          fi
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Build verification
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SITE_NAME: ${{ secrets.NEXT_PUBLIC_SITE_NAME }}

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes."
            exit 0
          fi
          git config user.email "bot@aipulsedaily.com"
          git config user.name "Humanizer Agent"
          git add content/posts/
          git commit -m "auto: humanize posts $(date +%Y-%m-%d)"
          git push
