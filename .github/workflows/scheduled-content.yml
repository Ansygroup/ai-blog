name: Scheduled content generation

on:
  push:
    branches: [main]
    paths: [.github/workflows/scheduled-content.yml]
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  generate:
    name: Generate one post from keyword queue
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Generate one post
        run: |
          if [ ! -s scripts/keyword-queue.json ]; then
            echo "Keyword queue is empty — nothing to generate."
            exit 0
          fi
          node scripts/generate-post.js --from-keywords --batch 1
          node scripts/polish-posts.js
          NEW_SLUG=$(ls -1t content/posts/*.mdx | head -1 | xargs basename -s .mdx)
          if [ -n "$NEW_SLUG" ]; then
            node scripts/humanize-post.js "$NEW_SLUG"
          fi
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GROQ_API_KEY_5: ${{ secrets.GROQ_API_KEY_5 }}
      - name: Run SEO audit
        run: node scripts/seo-audit.js
      - name: Build verification
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SITE_NAME: ${{ secrets.NEXT_PUBLIC_SITE_NAME }}
      - name: Open PR with new post and enable auto-merge
        run: |
          if git diff --quiet; then
            echo "No changes to push."
            exit 0
          fi
          BRANCH="auto/content-$(date +%s)"
          git config user.email "bot@ai-blog-ten-steel.vercel.app"
          git config user.name "Auto-Publisher"
          git checkout -b "$BRANCH"
          git add content/posts/ scripts/keyword-queue.json
          git commit -m "auto: generate new post

          Generated by scheduled content engine.
          Topic: see content/posts/*.mdx for the new file."
          git push origin "$BRANCH"
          gh pr create \
            --title "auto: new content $(date +%Y-%m-%d)" \
            --body "Auto-generated by the scheduled content engine. Review and merge when ready." \
            --base main \
            --head "$BRANCH" \
            --label "auto-generated" | tee pr-url.txt
          PR_NUMBER=$(grep -oP '/pull/\K[0-9]+' pr-url.txt)
          gh pr merge --auto --squash "$PR_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: IndexNow submit
        if: always()
        run: node scripts/indexnow-submit.js || echo "IndexNow submit failed (non-fatal)"
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
