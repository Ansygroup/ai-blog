name: Scheduled content generation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  generate:
    name: Generate one post from keyword queue
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: Generate one post
        run: |
          if [ ! -s scripts/keyword-queue.json ]; then
            echo "Keyword queue is empty — nothing to generate."
            exit 0
          fi
          node scripts/generate-post.js --from-keywords --batch 1
          node scripts/polish-posts.js
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      - name: Run SEO audit
        run: node scripts/seo-audit.js
      - name: Build verification
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SITE_NAME: ${{ secrets.NEXT_PUBLIC_SITE_NAME }}
      - name: Open PR with new post
        run: |
          if git diff --quiet; then
            echo "No changes to push."
            exit 0
          fi
          BRANCH="auto/content-$(date +%s)"
          git config user.email "bot@ai-blog-ten-steel.vercel.app"
          git config user.name "Auto-Publisher"
          git checkout -b "$BRANCH"
          git add content/posts/ scripts/keyword-queue.json
          git commit -m "auto: generate new post

          Generated by scheduled content engine.
          Topic: see content/posts/*.mdx for the new file."
          git push origin "$BRANCH"
          gh pr create \
            --title "auto: new content $(date +%Y-%m-%d)" \
            --body "Auto-generated by the scheduled content engine. Review and merge when ready." \
            --base main \
            --head "$BRANCH" \
            --label "auto-generated"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: IndexNow submit
        if: always()
        run: node scripts/indexnow-submit.js || echo "IndexNow submit failed (non-fatal)"
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
