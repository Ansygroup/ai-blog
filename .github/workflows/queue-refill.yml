name: Queue Refill — Keep keyword queue stocked


on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  refill:
    name: Refill keyword queue
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      - name: Check queue and refill if low
        run: |
          COUNT=$(node -e "const q=require('./scripts/keyword-queue.json'); console.log(q.length);")
          echo "Current queue: $COUNT topics"
          if [ "$COUNT" -lt 10 ]; then
            echo "Queue low ($COUNT) — refilling..."
            node scripts/content-strategy.js --fill-queue
          else
            echo "Queue healthy ($COUNT topics) — no refill needed."
          fi
          echo "queue_count=$COUNT" >> $GITHUB_OUTPUT
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}

      - name: Commit queue update
        run: |
          if git diff --quiet; then exit 0; fi
          git config user.email "bot@aipulsedaily.com"
          git config user.name "Queue Refill Agent"
          git add scripts/keyword-queue.json
          git commit -m "auto: refill keyword queue"
          git push
