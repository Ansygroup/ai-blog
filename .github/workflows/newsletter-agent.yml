name: Newsletter Agent — Weekly digest

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  newsletter:
    name: Compile weekly digest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      - name: Find this week's posts
        run: |
          ONE_WEEK_AGO=$(date -d "7 days ago" +%s)
          echo "=== This Week's Posts ==="
          for f in $(ls -t content/posts/*.mdx 2>/dev/null); do
            FILE_DATE=$(head -30 "$f" | grep "^date:" | sed 's/^date: *//')
            if [ -z "$FILE_DATE" ]; then continue; fi
            FILE_TS=$(date -d "$FILE_DATE" +%s 2>/dev/null || echo 0)
            if [ "$FILE_TS" -gt "$ONE_WEEK_AGO" ]; then
              TITLE=$(head -30 "$f" | grep "^title:" | sed 's/^title: *["\x27]//;s/["\x27]$//')
              SLUG=$(basename "$f" .mdx)
              echo "  - $TITLE ($SLUG)"
            fi
          done > weekly-posts.txt
          cat weekly-posts.txt

      - name: Generate digest HTML
        run: |
          echo "=== AI Pulse Daily — Weekly Digest ==="
          echo ""
          echo "This week's top AI tool reviews:"
          echo ""
          cat weekly-posts.txt
          echo ""
          echo "---"
          echo "Would send via email when newsletter API is configured."

      - name: Save digest
        run: |
          mkdir -p public/digests
          cat weekly-posts.txt > public/digests/weekly-$(date +%Y-%m-%d).txt
