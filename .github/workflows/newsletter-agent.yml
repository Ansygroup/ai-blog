name: Newsletter Agent — Weekly digest


on:
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

jobs:
  newsletter:
    name: Compile weekly digest
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      - name: Generate newsletter
        run: node scripts/newsletter-generator.js
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}

      - name: Commit newsletter
        run: |
          if git diff --quiet; then
            echo "No new posts this week."
            exit 0
          fi
          BRANCH="auto/newsletter-$(date +%s)"
          git config user.email "bot@aipulsedaily.com"
          git config user.name "Newsletter Agent"
          git checkout -b "$BRANCH"
          git add public/digests/
          git commit -m "auto: weekly digest $(date +%Y-%m-%d)"
          git push origin "$BRANCH"
          gh pr create --title "auto: weekly digest $(date +%Y-%m-%d)" --body "Auto-generated newsletter digest." --base main --head "$BRANCH" --label auto-generated | tee pr-url.txt
          gh pr merge --auto --squash "$(grep -oP '/pull/\K[0-9]+' pr-url.txt)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
