name: Build + Deploy + IndexNow

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Auto-publish a new post every 8 hours from the keyword queue.
  # Note: schedule triggers DON'T run auto-publish, only push triggers do,
  # to prevent an infinite commit-loop on the same PR.
  schedule:
    - cron: '0 */8 * * *'

jobs:
  # ===========================================================
  # Job 1: Lint + SEO audit (fast, runs first)
  # ===========================================================
  audit:
    name: SEO audit + content checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: SEO audit
        run: node scripts/seo-audit.js
      - name: Smoke test (no server)
        run: |
          # Build and verify the static export passes our smoke checks
          # We do a real build here so we catch any frontmatter/JSON-LD issues
          # before the deploy job.
          NEXT_PUBLIC_SITE_URL=https://ai-blog-ten-steel.vercel.app NEXT_PUBLIC_SITE_NAME="CI Test" npm run build
      - name: Verify build output
        run: |
          test -f .next/BUILD_ID || (echo "no BUILD_ID" && exit 1)
          echo "Build output verified."

  # ===========================================================
  # Job 2: Full deploy to Vercel + auto-publish + IndexNow
  # Only runs if audit passed.
  # ===========================================================
  build-deploy:
    name: Deploy + auto-publish + IndexNow
    needs: audit
    runs-on: ubuntu-latest
    # Only run auto-publish on push, not on schedule (avoids loops)
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SITE_NAME: ${{ secrets.NEXT_PUBLIC_SITE_NAME }}
          NEXT_PUBLIC_ADSENSE_CLIENT: ${{ secrets.NEXT_PUBLIC_ADSENSE_CLIENT }}
          NEXT_PUBLIC_ADSENSE_SLOT_TOP: ${{ secrets.NEXT_PUBLIC_ADSENSE_SLOT_TOP }}
          NEXT_PUBLIC_ADSENSE_SLOT_MID: ${{ secrets.NEXT_PUBLIC_ADSENSE_SLOT_MID }}
          NEXT_PUBLIC_ADSENSE_SLOT_SIDE: ${{ secrets.NEXT_PUBLIC_ADSENSE_SLOT_SIDE }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${{ secrets.NEXT_PUBLIC_PLAUSIBLE_DOMAIN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
      - uses: actions/upload-artifact@v4
        with: { name: nextjs, path: .next, retention-days: 7 }

      # Deploy to Vercel (requires VERCEL_TOKEN secret)
      - name: Deploy to Vercel
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          npm install -g vercel
          vercel deploy --prod --yes --token "${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      # 24/7 content auto-generation: rotate through keyword queue
      # Uses a separate branch to avoid the infinite-loop problem.
      - name: Auto-generate next post (if queue has items)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ -s scripts/keyword-queue.json ]; then
            node scripts/generate-post.js --from-keywords --batch 1 || echo "Generation failed, continuing"
            # Post-polish so generated posts pass SEO audit on the next push
            node scripts/polish-posts.js || true
            # Configure git and push to a separate branch
            git config user.email "bot@ai-blog-ten-steel.vercel.app"
            git config user.name "Auto-Publisher"
            git checkout -b auto/content-$(date +%s)
            git add content/posts/ scripts/keyword-queue.json
            if git diff --cached --quiet; then
              echo "No new posts generated."
            else
              git commit -m "auto: generate new post"
              git push origin HEAD
              # Open a PR for human review (or auto-merge if you set up auto-merge rules)
              gh pr create --title "auto: generated post" --body "Auto-generated by content engine." --base main --head $(git branch --show-current) || true
            fi
          fi
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Ping IndexNow for instant Bing/AI-engine indexing
      - name: IndexNow submit
        if: always()
        run: |
          echo "INDEXNOW_KEY=${{ secrets.INDEXNOW_KEY }}" >> .env.local
          echo "NEXT_PUBLIC_SITE_URL=${{ secrets.NEXT_PUBLIC_SITE_URL }}" >> .env.local
          node scripts/indexnow-submit.js || echo "IndexNow submit failed (non-fatal)"
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
