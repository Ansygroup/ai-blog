name: Build + Deploy + IndexNow

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  audit:
    name: SEO audit + content checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - name: SEO audit
        run: node scripts/seo-audit.js
      - name: Smoke test (no server)
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SITE_NAME: ${{ secrets.NEXT_PUBLIC_SITE_NAME }}
      - name: Verify build output
        run: |
          test -f .next/BUILD_ID || (echo "no BUILD_ID" && exit 1)
          echo "Build output verified."

  build-deploy:
    name: Deploy + auto-publish + IndexNow
    needs: audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SITE_NAME: ${{ secrets.NEXT_PUBLIC_SITE_NAME }}
          NEXT_PUBLIC_ADSENSE_CLIENT: ${{ secrets.NEXT_PUBLIC_ADSENSE_CLIENT }}
          NEXT_PUBLIC_ADSENSE_SLOT_TOP: ${{ secrets.NEXT_PUBLIC_ADSENSE_SLOT_TOP }}
          NEXT_PUBLIC_ADSENSE_SLOT_MID: ${{ secrets.NEXT_PUBLIC_ADSENSE_SLOT_MID }}
          NEXT_PUBLIC_ADSENSE_SLOT_SIDE: ${{ secrets.NEXT_PUBLIC_ADSENSE_SLOT_SIDE }}
          NEXT_PUBLIC_GA_ID: ${{ secrets.NEXT_PUBLIC_GA_ID }}
          NEXT_PUBLIC_PLAUSIBLE_DOMAIN: ${{ secrets.NEXT_PUBLIC_PLAUSIBLE_DOMAIN }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
      - uses: actions/upload-artifact@v4
        with: { name: nextjs, path: .next, retention-days: 7 }

      - name: Deploy to Vercel
        if: github.ref == 'refs/heads/main'
        run: |
          npm install -g vercel
          vercel deploy --prod --yes --token "${{ secrets.VERCEL_TOKEN }}"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Auto-generate next post (if queue has items)
        if: github.ref == 'refs/heads/main'
        run: |
          if [ -s scripts/keyword-queue.json ]; then
            node scripts/generate-post.js --from-keywords --batch 1 || echo "Generation failed, continuing"
            node scripts/polish-posts.js || true
            git config user.email "bot@ai-blog-ten-steel.vercel.app"
            git config user.name "Auto-Publisher"
            git checkout -b auto/content-$(date +%s)
            git add content/posts/ scripts/keyword-queue.json
            if git diff --cached --quiet; then
              echo "No new posts generated."
            else
              git commit -m "auto: generate new post"
              git push origin HEAD
              gh pr create --title "auto: generated post" --body "Auto-generated by content engine." --base main --head $(git branch --show-current) --label "auto-generated" || true
            fi
          fi
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: IndexNow submit
        if: always()
        run: node scripts/indexnow-submit.js || echo "IndexNow submit failed (non-fatal)"
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
