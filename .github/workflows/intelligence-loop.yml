name: Intelligence Loop — Self-Improving AI System

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      generate_posts:
        description: 'Number of posts to generate (0-3)'
        required: false
        default: '1'
      skip_optimization:
        description: 'Skip SEO/content optimization steps'
        required: false
        default: 'false'

jobs:
  intelligence-loop:
    name: AI Self-Improvement Cycle
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm }
      - run: npm ci

      - name: Content strategy analysis
        id: strategy
        run: |
          echo "Content strategy analysis..."
          node scripts/content-strategy.js --analyze-only 2>&1 | tee strategy-report.txt
          echo "strategy_done=true" >> $GITHUB_OUTPUT

      - name: Generate topic suggestions
        id: suggestions
        run: |
          echo "Generating AI topic suggestions..."
          node scripts/content-strategy.js --fill-queue 2>&1 || echo "suggestion_failed=true" >> $GITHUB_OUTPUT
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GROQ_API_KEY_5: ${{ secrets.GROQ_API_KEY_5 }}
          APIFY_API_KEY: ${{ secrets.APIFY_API_KEY }}

      - name: SEO optimization
        if: inputs.skip_optimization != 'true'
        run: |
          echo "Running SEO optimizer..."
          node scripts/seo-optimizer.js --fix 2>&1 || true
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GROQ_API_KEY_5: ${{ secrets.GROQ_API_KEY_5 }}

      - name: Refresh stale content
        if: inputs.skip_optimization != 'true'
        run: |
          echo "Refreshing stale content..."
          node scripts/content-refresher.js --refresh 2>&1 || true

      - name: Generate new post
        id: generate
        run: |
          POST_COUNT="${{ inputs.generate_posts || '1' }}"
          if [ "$POST_COUNT" = "0" ]; then
            echo "Post generation skipped (count=0)"
            echo "generated=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ ! -s scripts/keyword-queue.json ]; then
            echo "Keyword queue is empty — nothing to generate."
            echo "generated=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          node scripts/generate-post.js --from-keywords --batch "$POST_COUNT" 2>&1 || echo "generation_failed=true" >> $GITHUB_OUTPUT
          node scripts/polish-posts.js 2>&1 || true
          echo "generated=true" >> $GITHUB_OUTPUT
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GROQ_API_KEY_5: ${{ secrets.GROQ_API_KEY_5 }}

      - name: Auto internal linking
        if: steps.generate.outputs.generated == 'true'
        run: |
          echo "Adding internal links..."
          node scripts/auto-internal-link.js 2>&1 || true

      - name: SEO audit
        run: |
          echo "Running SEO audit..."
          node scripts/seo-audit.js 2>&1
        continue-on-error: true

      - name: Build verification
        run: npm run build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
          NEXT_PUBLIC_SITE_NAME: ${{ secrets.NEXT_PUBLIC_SITE_NAME }}

      - name: Create PR with changes and enable auto-merge
        run: |
          if git diff --quiet; then
            echo "No changes to push."
            exit 0
          fi
          BRANCH="auto/improvement-$(date +%Y%m%d-%H%M)"
          git config user.email "bot@aipulsedaily.com"
          git config user.name "AI Improvement Bot"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "auto: self-improvement cycle $(date +%Y-%m-%d)

          Changes:
          - Content strategy analysis
          - SEO optimization fixes
          - Content refresh for stale posts
          - New post generation (if queue had items)
          - Auto internal linking"
          git push origin "$BRANCH"
          gh pr create \
            --title "auto: self-improvement cycle $(date +%Y-%m-%d)" \
            --body "$(cat <<-EOB
          ## AI Self-Improvement Cycle

          This PR was automatically generated by the intelligence loop workflow.

          ### What was done:
          - Content strategy analysis
          - SEO optimization
          - Content refresh
          - New post generation
          - Auto internal linking

          ### Review checklist:
          - [ ] Verify new posts have accurate information
          - [ ] Check internal links are contextually relevant
          - [ ] Review SEO title/excerpt changes
          - [ ] Run \`npm run build\` to verify
          - [ ] Run \`node scripts/smoke-test.js --start-server\`

          Merge when ready.
          EOB
          )" \
            --base main \
            --head "$BRANCH" \
            --label "auto-generated" | tee pr-url.txt
          PR_NUMBER=$(grep -oP '/pull/\K[0-9]+' pr-url.txt)
          gh pr merge --auto --squash "$PR_NUMBER"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: IndexNow submit
        if: always()
        run: node scripts/indexnow-submit.js || true
        env:
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          NEXT_PUBLIC_SITE_URL: ${{ secrets.NEXT_PUBLIC_SITE_URL }}
